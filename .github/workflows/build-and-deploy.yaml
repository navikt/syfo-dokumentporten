name: Build and deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [ checks_requested ]
  workflow_dispatch:

jobs:
  jar-app:
    # change back to @main before merging
    uses: navikt/teamesyfo-github-actions-workflows/.github/workflows/jar-app.yaml@upgrade-codeql
    permissions:
      actions: read
      contents: write
      security-events: write
      packages: write
      id-token: write
    secrets: inherit
    with:
      app: syfo-dokumentporten
      java-version: '21'
